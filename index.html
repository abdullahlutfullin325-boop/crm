<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM — Абдулла Риелтор 🔑</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a18; min-height: 100vh; }
  header { background: #1a1a18; color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 17px; font-weight: 500; }
  header span { font-size: 13px; opacity: 0.5; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border-radius: 10px; border: 1px solid #e8e8e4; padding: 0.85rem 1rem; }
  .stat-n { font-size: 24px; font-weight: 600; color: #1a1a18; }
  .stat-l { font-size: 12px; color: #888; margin-top: 2px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { padding: 8px 18px; border-radius: 8px; border: 1px solid #ddd; background: transparent; color: #666; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.15s; }
  .tab.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .section { display: none; }
  .section.active { display: block; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .toolbar input { flex: 1; min-width: 160px; padding: 9px 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; background: #fff; color: #1a1a18; outline: none; }
  .toolbar input:focus { border-color: #aaa; }
  .btn { padding: 9px 14px; border-radius: 8px; border: 1px solid #ddd; background: transparent; color: #1a1a18; cursor: pointer; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn:hover { background: #f0f0ec; }
  .btn.primary { background: #1a1a18; color: #fff; border-color: #1a1a18; }
  .btn.primary:hover { opacity: 0.85; }
  .btn.danger { color: #c0392b; border-color: #f5c6c2; }
  .btn.danger:hover { background: #fdf0ee; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 12px; }
  .card { background: #fff; border: 1px solid #e8e8e4; border-radius: 12px; padding: 1rem 1.2rem; }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; }
  .av-client { background: #dbeafe; color: #1d4ed8; }
  .av-owner { background: #dcfce7; color: #15803d; }
  .av-obj { background: #fef3c7; color: #b45309; }
  .card-name { font-weight: 600; font-size: 15px; color: #1a1a18; }
  .card-sub { font-size: 13px; color: #888; }
  .card-body { border-top: 1px solid #f0f0ec; padding-top: 10px; display: flex; flex-direction: column; gap: 7px; }
  .row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .row-label { color: #888; }
  .row-val { color: #1a1a18; font-weight: 500; }
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-hot { background: #fde8e8; color: #c0392b; }
  .badge-warm { background: #fef3c7; color: #b45309; }
  .badge-cold { background: #dbeafe; color: #1d4ed8; }
  .badge-free { background: #dcfce7; color: #15803d; }
  .badge-busy { background: #fde8e8; color: #c0392b; }
  .badge-deal { background: #ede9fe; color: #6d28d9; }
  .card-actions { display: flex; gap: 6px; margin-top: 12px; }
  .empty { text-align: center; padding: 3rem 1rem; color: #bbb; font-size: 14px; }
  .empty-icon { font-size: 36px; margin-bottom: 8px; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 14px; padding: 1.5rem; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1.2rem; color: #1a1a18; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; padding: 9px 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; background: #fff; color: #1a1a18; font-family: inherit; outline: none; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #aaa; }
  .field textarea { height: 65px; resize: vertical; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.2rem; }
  .note-text { font-size: 12px; color: #aaa; margin-top: 6px; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>🔑 CRM — Абдулла Риелтор</h1>
  <span>Казань • Аренда</span>
</header>

<div class="wrap">
  <div class="stats" id="stats"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('clients')">👤 Клиенты</button>
    <button class="tab" onclick="switchTab('owners')">🏢 Собственники</button>
    <button class="tab" onclick="switchTab('objects')">🏠 Объекты</button>
  </div>
  <div id="clients" class="section active">
    <div class="toolbar">
      <input type="text" id="search-clients" placeholder="Поиск клиента..." oninput="render()">
      <button class="btn primary" onclick="openModal('client')">+ Добавить</button>
    </div>
    <div class="cards" id="cards-clients"></div>
  </div>
  <div id="owners" class="section">
    <div class="toolbar">
      <input type="text" id="search-owners" placeholder="Поиск собственника..." oninput="render()">
      <button class="btn primary" onclick="openModal('owner')">+ Добавить</button>
    </div>
    <div class="cards" id="cards-owners"></div>
  </div>
  <div id="objects" class="section">
    <div class="toolbar">
      <input type="text" id="search-objects" placeholder="Поиск объекта..." oninput="render()">
      <button class="btn primary" onclick="openModal('object')">+ Добавить</button>
    </div>
    <div class="cards" id="cards-objects"></div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Отмена</button>
      <button class="btn primary" onclick="saveModal()">Сохранить</button>
    </div>
  </div>
</div>

<script>
var DEFAULT_DATA = {
  clients: [
    {name:"Юлия",phone:"+7 986 012 13 13",budget:"50000",area:"Высокая Гора, ЖК Белая Аллея",rooms:"3к",status:"hot",note:"2-3к, дом/таунхаус. Муж, жена, трое детей, младшему 2 года."},
    {name:"Марьям",phone:"+7 963 234 23 03",budget:"30000",area:"Салават 2",rooms:"3к",status:"warm",note:"СНГ 6 чел, нужна рега. Младшему 13 лет. +- к 17 числу"},
    {name:"Ландыш",phone:"+7 962 554 76 30",budget:"30000",area:"По городу, Высокая гора",rooms:"1к",status:"warm",note:"Татары, мама и ребенок 4 мес"},
    {name:"Ирина",phone:"+7 960 323 57 66",budget:"35000",area:"Вахитовский, ул.Гоголя и рядом",rooms:"1к",status:"cold",note:"2 парня русские студенты, к концу августа"},
    {name:"Марина",phone:"+7 962 561 01 50",budget:"40000",area:"Вахитовский",rooms:"1к",status:"cold",note:"К 20 августу 2 парня студента РФ театральное училище"},
    {name:"Ксения",phone:"+7 912 902 97 19",budget:"30000",area:"Песчаные ковали",rooms:"2к",status:"warm",note:"2 дев. Тюмень и Томск. Конец июля. Двушка или однушка раздельная"},
    {name:"Не знаю",phone:"+7 987 097 19 98",budget:"30000",area:"ТЦ Порт и рядом",rooms:"1к",status:"hot",note:"Девушка одна РФ"}
  ],
  owners: [],
  objects: []
};

var data;
try {
  var saved = localStorage.getItem('crm_abdulla_v3');
  data = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
} catch(e) {
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function save() {
  try { localStorage.setItem('crm_abdulla_v3', JSON.stringify(data)); } catch(e) {}
}

function initials(name) {
  return (name||'').split(' ').slice(0,2).map(function(w){ return w[0]||''; }).join('').toUpperCase() || '?';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t,i){ t.classList.toggle('active', ['clients','owners','objects'][i] === tab); });
  document.querySelectorAll('.section').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(tab).classList.add('active');
}

function statusBadge(s) {
  var map = {hot:['badge-hot','🔥 Горячий'],warm:['badge-warm','🟡 Тёплый'],cold:['badge-cold','❄️ Холодный'],free:['badge-free','✅ Свободен'],busy:['badge-busy','🔴 Занят'],deal:['badge-deal','🤝 Сделка']};
  var r = map[s] || ['badge-cold', s];
  return '<span class="badge ' + r[0] + '">' + r[1] + '</span>';
}

function render() {
  renderStats();
  renderCards('clients');
  renderCards('owners');
  renderCards('objects');
}

function renderStats() {
  document.getElementById('stats').innerHTML =
    '<div class="stat"><div class="stat-n">'+data.clients.length+'</div><div class="stat-l">Клиентов</div></div>' +
    '<div class="stat"><div class="stat-n">'+data.owners.length+'</div><div class="stat-l">Собственников</div></div>' +
    '<div class="stat"><div class="stat-n">'+data.objects.length+'</div><div class="stat-l">Объектов</div></div>' +
    '<div class="stat"><div class="stat-n">'+data.objects.filter(function(o){return o.status==='free';}).length+'</div><div class="stat-l">Свободных</div></div>' +
    '<div class="stat"><div class="stat-n">'+data.clients.filter(function(c){return c.status==='hot';}).length+'</div><div class="stat-l">Горячих</div></div>';
}

function renderCards(type) {
  var el = document.getElementById('cards-' + type);
  var q = (document.getElementById('search-' + type) ? document.getElementById('search-' + type).value : '').toLowerCase();
  var items = data[type].filter(function(item) {
    var name = item.name || item.address || '';
    return name.toLowerCase().indexOf(q) !== -1 || (item.phone||'').indexOf(q) !== -1 || (item.area||'').toLowerCase().indexOf(q) !== -1;
  });
  if (!items.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>Пусто — нажми &quot;+ Добавить&quot;</div>'; return; }
  el.innerHTML = items.map(function(item) {
    var realIdx = data[type].indexOf(item);
    if (type === 'clients') return '<div class="card"><div class="card-header"><div class="avatar av-client">'+initials(item.name)+'</div><div><div class="card-name">'+item.name+'</div><div class="card-sub">'+(item.phone||'Телефон не указан')+'</div></div></div><div class="card-body"><div class="row"><span class="row-label">Бюджет</span><span class="row-val">'+(item.budget ? Number(item.budget).toLocaleString('ru')+' ₽/мес' : '—')+'</span></div><div class="row"><span class="row-label">Район</span><span class="row-val">'+(item.area||'—')+'</span></div><div class="row"><span class="row-label">Комнат</span><span class="row-val">'+(item.rooms||'—')+'</span></div><div class="row"><span class="row-label">Статус</span>'+statusBadge(item.status||'cold')+'</div>'+(item.note ? '<div class="note-text">📝 '+item.note+'</div>' : '')+'</div><div class="card-actions"><button class="btn" style="flex:1" onclick="openModal(\'client\','+realIdx+')">✏️ Изменить</button><button class="btn danger" onclick="deleteItem(\'clients\','+realIdx+')">🗑️</button></div></div>';
    if (type === 'owners') return '<div class="card"><div class="card-header"><div class="avatar av-owner">'+initials(item.name)+'</div><div><div class="card-name">'+item.name+'</div><div class="card-sub">'+(item.phone||'Телефон не указан')+'</div></div></div><div class="card-body"><div class="row"><span class="row-label">Объект</span><span class="row-val">'+(item.object||'—')+'</span></div><div class="row"><span class="row-label">Цена</span><span class="row-val">'+(item.price ? Number(item.price).toLocaleString('ru')+' ₽/мес' : '—')+'</span></div><div class="row"><span class="row-label">Район</span><span class="row-val">'+(item.area||'—')+'</span></div><div class="row"><span class="row-label">Коммуналка</span><span class="row-val">'+(item.utility||'—')+'</span></div>'+(item.note ? '<div class="note-text">📝 '+item.note+'</div>' : '')+'</div><div class="card-actions"><button class="btn" style="flex:1" onclick="openModal(\'owner\','+realIdx+')">✏️ Изменить</button><button class="btn danger" onclick="deleteItem(\'owners\','+realIdx+')">🗑️</button></div></div>';
    if (type === 'objects') return '<div class="card"><div class="card-header"><div class="avatar av-obj">🏠</div><div><div class="card-name">'+item.address+'</div><div class="card-sub">'+(item.type||'')+' '+(item.floor ? '• '+item.floor+' эт.' : '')+'</div></div></div><div class="card-body"><div class="row"><span class="row-label">Цена</span><span class="row-val">'+(item.price ? Number(item.price).toLocaleString('ru')+' ₽/мес' : '—')+'</span></div><div class="row"><span class="row-label">Площадь</span><span class="row-val">'+(item.area ? item.area+' м²' : '—')+'</span></div><div class="row"><span class="row-label">Собственник</span><span class="row-val">'+(item.owner||'—')+'</span></div><div class="row"><span class="row-label">Статус</span>'+statusBadge(item.status||'free')+'</div>'+(item.note ? '<div class="note-text">📝 '+item.note+'</div>' : '')+'</div><div class="card-actions"><button class="btn" style="flex:1" onclick="openModal(\'object\','+realIdx+')">✏️ Изменить</button><button class="btn danger" onclick="deleteItem(\'objects\','+realIdx+')">🗑️</button></div></div>';
  }).join('');
}

var editType = null, editIndex = null;

function openModal(type, idx) {
  editType = type; editIndex = (idx !== undefined ? idx : null);
  var key = type + 's';
  var item = (editIndex !== null) ? data[key][editIndex] : {};
  var titles = {client: editIndex !== null ? 'Редактировать клиента' : 'Новый клиент', owner: editIndex !== null ? 'Редактировать собственника' : 'Новый собственник', object: editIndex !== null ? 'Редактировать объект' : 'Новый объект'};
  document.getElementById('modal-title').textContent = titles[type];
  var html = '';
  if (type === 'client') html = '<div class="field"><label>Имя *</label><input id="f-name" value="'+(item.name||'')+'" placeholder="Айгуль Хасанова"></div><div class="field"><label>Телефон</label><input id="f-phone" value="'+(item.phone||'')+'" placeholder="+7 900 000 00 00"></div><div class="field"><label>Бюджет (₽/мес)</label><input id="f-budget" type="number" value="'+(item.budget||'')+'" placeholder="35000"></div><div class="field"><label>Желаемый район</label><input id="f-area" value="'+(item.area||'')+'" placeholder="Центр..."></div><div class="field"><label>Кол-во комнат</label><select id="f-rooms"><option value="">Любое</option><option value="Студия" '+(item.rooms==='Студия'?'selected':'')+'>Студия</option><option value="1к" '+(item.rooms==='1к'?'selected':'')+'>1к</option><option value="2к" '+(item.rooms==='2к'?'selected':'')+'>2к</option><option value="3к" '+(item.rooms==='3к'?'selected':'')+'>3к</option></select></div><div class="field"><label>Статус</label><select id="f-status"><option value="hot" '+(item.status==='hot'?'selected':'')+'>🔥 Горячий</option><option value="warm" '+(item.status==='warm'?'selected':'')+'>🟡 Тёплый</option><option value="cold" '+((item.status||'cold')==='cold'?'selected':'')+'>❄️ Холодный</option><option value="deal" '+(item.status==='deal'?'selected':'')+'>🤝 Сделка</option></select></div><div class="field"><label>Заметка</label><textarea id="f-note">'+(item.note||'')+'</textarea></div>';
  if (type === 'owner') html = '<div class="field"><label>Имя *</label><input id="f-name" value="'+(item.name||'')+'" placeholder="Рустам Закиров"></div><div class="field"><label>Телефон</label><input id="f-phone" value="'+(item.phone||'')+'" placeholder="+7 900 000 00 00"></div><div class="field"><label>Описание объекта</label><input id="f-object" value="'+(item.object||'')+'" placeholder="1к, ул. Баумана 12"></div><div class="field"><label>Цена (₽/мес)</label><input id="f-price" type="number" value="'+(item.price||'')+'" placeholder="30000"></div><div class="field"><label>Район</label><input id="f-area" value="'+(item.area||'')+'" placeholder="Центр"></div><div class="field"><label>Коммуналка входит?</label><select id="f-utility"><option value="Входит" '+(item.utility==='Входит'?'selected':'')+'>Входит</option><option value="Не входит" '+(item.utility==='Не входит'?'selected':'')+'>Не входит</option><option value="Частично" '+(item.utility==='Частично'?'selected':'')+'>Частично</option></select></div><div class="field"><label>Заметка</label><textarea id="f-note">'+(item.note||'')+'</textarea></div>';
  if (type === 'object') html = '<div class="field"><label>Адрес *</label><input id="f-address" value="'+(item.address||'')+'" placeholder="ул. Баумана 12, кв. 34"></div><div class="field"><label>Тип</label><select id="f-type"><option value="Студия" '+(item.type==='Студия'?'selected':'')+'>Студия</option><option value="1к" '+(item.type==='1к'?'selected':'')+'>1к квартира</option><option value="2к" '+(item.type==='2к'?'selected':'')+'>2к квартира</option><option value="3к" '+(item.type==='3к'?'selected':'')+'>3к квартира</option><option value="Дом" '+(item.type==='Дом'?'selected':'')+'>Дом</option></select></div><div class="field"><label>Цена (₽/мес)</label><input id="f-price" type="number" value="'+(item.price||'')+'" placeholder="35000"></div><div class="field"><label>Площадь (м²)</label><input id="f-area" type="number" value="'+(item.area||'')+'" placeholder="42"></div><div class="field"><label>Этаж</label><input id="f-floor" value="'+(item.floor||'')+'" placeholder="5/9"></div><div class="field"><label>Собственник</label><input id="f-owner" value="'+(item.owner||'')+'" placeholder="Рустам Закиров"></div><div class="field"><label>Статус</label><select id="f-status"><option value="free" '+((item.status||'free')==='free'?'selected':'')+'>✅ Свободен</option><option value="busy" '+(item.status==='busy'?'selected':'')+'>🔴 Занят</option><option value="deal" '+(item.status==='deal'?'selected':'')+'>🤝 Сделка</option></select></div><div class="field"><label>Заметка</label><textarea id="f-note">'+(item.note||'')+'</textarea></div>';
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); editType=null; editIndex=null; }

function g(id){ var el=document.getElementById(id); return el ? el.value.trim() : ''; }

function saveModal() {
  var item = {};
  if (editType==='client') {
    var name=g('f-name'); if(!name){alert('Введи имя клиента');return;}
    item={name:name,phone:g('f-phone'),budget:g('f-budget'),area:g('f-area'),rooms:g('f-rooms'),status:g('f-status')||'cold',note:g('f-note')};
    if(editIndex!==null) data.clients[editIndex]=item; else data.clients.push(item);
  } else if (editType==='owner') {
    var name=g('f-name'); if(!name){alert('Введи имя собственника');return;}
    item={name:name,phone:g('f-phone'),object:g('f-object'),price:g('f-price'),area:g('f-area'),utility:g('f-utility'),note:g('f-note')};
    if(editIndex!==null) data.owners[editIndex]=item; else data.owners.push(item);
  } else if (editType==='object') {
    var address=g('f-address'); if(!address){alert('Введи адрес объекта');return;}
    item={address:address,type:g('f-type'),price:g('f-price'),area:g('f-area'),floor:g('f-floor'),owner:g('f-owner'),status:g('f-status')||'free',note:g('f-note')};
    if(editIndex!==null) data.objects[editIndex]=item; else data.objects.push(item);
  }
  save(); closeModal(); render();
}

function deleteItem(type, idx) {
  if(!confirm('Удалить запись?')) return;
  data[type].splice(idx,1); save(); render();
}

document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

render();
</script>
</body>
</html>
